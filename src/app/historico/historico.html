<section class="page-header">
  <div>
    <p class="eyebrow">Histórico otimizado</p>
    <h2>View vw_historico_emprestimos</h2>
  </div>

  <mat-form-field appearance="outline">
    <mat-label>Filtrar histórico</mat-label>
    <input matInput (input)="onFilter($event)" placeholder="Aluno, livro ou funcionário" />
  </mat-form-field>
</section>

<div class="table-shell">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="id_emprestimo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id_emprestimo }}</td>
    </ng-container>

    <ng-container matColumnDef="aluno">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Aluno</th>
      <td mat-cell *matCellDef="let row">{{ row.aluno }}</td>
    </ng-container>

    <ng-container matColumnDef="funcionario">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Funcionário</th>
      <td mat-cell *matCellDef="let row">{{ row.funcionario }}</td>
    </ng-container>

    <ng-container matColumnDef="livro">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Livro</th>
      <td mat-cell *matCellDef="let row">{{ row.livro }}</td>
    </ng-container>

    <ng-container matColumnDef="data_emprestimo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Empréstimo</th>
      <td mat-cell *matCellDef="let row">{{ row.data_emprestimo }}</td>
    </ng-container>

    <ng-container matColumnDef="data_devolucao">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Devolução</th>
      <td mat-cell *matCellDef="let row">{{ row.data_devolucao }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  <mat-paginator [pageSize]="5" showFirstLastButtons></mat-paginator>
</div>
