<div class="register-layout">
  <section class="register-copy">
    <p class="eyebrow">Cadastro de demonstração</p>
    <h1>Crie um acesso para navegar pelas telas do sistema.</h1>
    <p>O backend real pode assumir o fluxo de autenticação sem alterar a estrutura da interface.</p>
  </section>

  <section class="register-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
      <h2>Novo usuário</h2>

      <label>
        Nome completo
        <input type="text" formControlName="nome" placeholder="Nome e sobrenome" />
      </label>

      <label>
        E-mail
        <input type="email" formControlName="email" placeholder="voce@universidade.edu" />
      </label>

      <label>
        Senha
        <input type="password" formControlName="senha" placeholder="Mínimo de 6 caracteres" />
      </label>

      <button type="submit" class="primary-btn" [disabled]="form.invalid">Cadastrar</button>

      @if (successMessage()) {
        <div class="feedback success">{{ successMessage() }}</div>
      }
    </form>
  </section>
</div>
