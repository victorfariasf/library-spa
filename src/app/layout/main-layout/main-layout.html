<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="/logo/logo-v2.png" alt="Biblioteca" />
      <div>
        <strong>Sistema Biblioteca</strong>
        <span>Frontend conectado ao backend</span>
      </div>
    </div>

    <nav class="nav-list">
      <a
        *ngFor="let item of navigation"
        [routerLink]="item.path"
        routerLinkActive="active"
        class="nav-item"
      >
        <i class="bi" [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>

    <button class="logout-btn" type="button" (click)="onLogout()">
      <i class="bi bi-box-arrow-right"></i>
      Sair
    </button>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <p class="eyebrow">Operação em andamento</p>
        <h1>{{ session()?.name ?? 'Biblioteca universitária' }}</h1>
      </div>
      <div class="profile-chip">
        <span>{{ initials() }}</span>
        <div>
          <strong>{{ session()?.name ?? 'Visitante' }}</strong>
          <small>{{ session()?.roleLabel ?? 'Acesso de demonstração' }}</small>
        </div>
      </div>
    </header>

    <section class="page-frame">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
