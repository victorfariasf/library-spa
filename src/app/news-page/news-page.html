<section class="news-header">
  <div>
    <p class="eyebrow">Curadoria externa</p>
    <h2>Notícias sobre livros e mercado editorial</h2>
  </div>
  @if (loading) {
    <span class="status-pill">Carregando</span>
  }
</section>

@if (error) {
  <div class="empty-state">{{ error }}</div>
}

<div class="news-grid">
  @for (news of newsList; track news.url) {
    <article class="news-card">
      <div class="news-image">
        <img [src]="news.urlToImage || '/logo/colecao-livros.png'" alt="Imagem da notícia" />
      </div>

      <div class="news-content">
        <h3>{{ news.title }}</h3>
        <p>{{ news.description }}</p>

        <a [href]="news.url" target="_blank" rel="noreferrer">Ler matéria</a>
      </div>
    </article>
  }
</div>
